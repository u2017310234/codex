name: Book Weekly Pipeline

on:
  schedule:
    # Friday 21:00 China Standard Time (UTC+8) => 13:00 UTC
    - cron: '0 13 * * 5'
  workflow_dispatch:

jobs:
  run-book-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r book/requirements.txt
      - name: Fetch JD/Douban data (JD errors won't fail)
        run: |
          set +e
          python3 book/pipelines/fetch_sources.py \
            --keyword "精装 首版" \
            --jd-mode phb \
            --pages 1 \
            --max-items 20 \
            --sleep-min 1.5 \
            --sleep-max 3.0 \
            --retries 3 \
            --timeout 25 \
            --jd-fast
          status=$?
          if [ $status -ne 0 ]; then
            echo "JD fetch failed; fallback to Douban tag 新书"
            python3 book/pipelines/fetch_sources.py \
              --douban-tag 新书 \
              --max-items 20 \
              --sleep-min 1.0 \
              --sleep-max 2.0 \
              --retries 2 \
              --timeout 25
          fi
          exit 0
      - name: Run scoring pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
        run: |
          TS=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p book/output
          python3 book/pipelines/run_pipeline.py \
            --jd-data book/data/jd_live.json \
            --douban-data book/data/douban_live.json \
            --output-dir book/output
          # update book/output/book.md (prepend latest)
          python3 book/pipelines/update_book_md.py --out-dir book/output --run-ts "$TS"
      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add book/output book/data/jd_live.json book/data/douban_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(book): weekly pipeline update"
          git push
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: book-pipeline-output
          path: |
            book/output
            book/data/jd_live.json
            book/data/douban_live.json
